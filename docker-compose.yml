# Local development stack.
# Usage:  make dev     (recommended)  /  docker compose up -d
#
# Services exposed:
#   api       http://localhost:3000  (docs at /docs)
#   postgres  localhost:5432         (nest/nest)
#   redis     localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest_postgres
    environment:
      POSTGRES_USER: admin_dashboard
      POSTGRES_PASSWORD: admin_dashboard
      POSTGRES_DB: admin_dashboard
    ports: ['5435:5432']
    volumes: ['pg_data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin_dashboard']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nest_redis
    ports: ['6379:6379']

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin_dashboard:admin_dashboard@postgres:5432/admin_dashboard?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports: ['3000:3000']

volumes:
  pg_data:
