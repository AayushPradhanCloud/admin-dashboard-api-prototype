# Local development stack.
# Usage:  make dev     (recommended)  /  docker compose up -d
#
# Keycloak is NOT included here — point KEYCLOAK_* env vars at your hosted instance.
# Set them in a .env file (see .env.example); this compose file reads them automatically.
#
# Services exposed:
#   api       http://localhost:3000  (docs at /docs)
#   postgres  localhost:5432         (nest/nest)
#   redis     localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest_postgres
    environment:
      POSTGRES_USER: nest
      POSTGRES_PASSWORD: nest
      POSTGRES_DB: nest
    ports: ['5432:5432']
    volumes: ['pg_data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nest']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nest_redis
    ports: ['6379:6379']

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://nest:nest@postgres:5432/nest?schema=public
      # Keycloak — loaded from .env file; override here only for docker-specific networking
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports: ['3000:3000']

volumes:
  pg_data:
